<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gövdağ — Giriş</title>
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg-deep:   #0a0b12;
  --glass:     rgba(255,255,255,0.08);
  --glass-hov: rgba(255,255,255,0.13);
  --glass-bd:  rgba(255,255,255,0.18);
  --glass-bd2: rgba(255,255,255,0.28);
  --glass-inp: rgba(255,255,255,0.06);
  --t0: #ffffff;
  --t1: rgba(255,255,255,0.78);
  --t2: rgba(255,255,255,0.48);
  --t3: rgba(255,255,255,0.26);
  --accent:    #7eeaad;
  --accent-g:  rgba(126,234,173,0.22);
  --accent-d:  #3db87a;
  --err:       rgba(255,100,100,0.85);
  --err-bg:    rgba(255,100,100,0.10);
  --err-bd:    rgba(255,100,100,0.30);
  --ok-bg:     rgba(126,234,173,0.10);
  --ok-bd:     rgba(126,234,173,0.28);
  --sans: 'Sora', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --blur: blur(32px);
  --r: 16px;
  --r2: 24px;
}
html,body{
  min-height:100%;font-family:var(--sans);
  background:var(--bg-deep);color:var(--t0);
  overflow-x:hidden;
}

/* ── ARKA PLAN ── */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:linear-gradient(135deg,#0a0916 0%,#0d1a2e 50%,#0a1218 100%);}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:drift 14s ease-in-out infinite alternate;}
.o1{width:600px;height:600px;background:radial-gradient(circle,#4a2db5 0%,transparent 70%);top:-200px;left:-150px;opacity:0.5;animation-duration:16s;}
.o2{width:500px;height:500px;background:radial-gradient(circle,#0e5c9e 0%,transparent 70%);bottom:-150px;right:-100px;opacity:0.45;animation-duration:12s;animation-delay:-5s;}
.o3{width:350px;height:350px;background:radial-gradient(circle,#1a7a4e 0%,transparent 70%);top:40%;left:55%;opacity:0.35;animation-duration:18s;animation-delay:-8s;}
.o4{width:280px;height:280px;background:radial-gradient(circle,#6a1f9a 0%,transparent 70%);bottom:25%;left:15%;opacity:0.30;animation-duration:13s;animation-delay:-3s;}
@keyframes drift{
  0%{transform:translate(0,0) scale(1);}
  33%{transform:translate(25px,-18px) scale(1.04);}
  66%{transform:translate(-12px,22px) scale(0.97);}
  100%{transform:translate(18px,8px) scale(1.02);}
}
.grid{position:absolute;inset:0;opacity:0.035;background-image:linear-gradient(rgba(255,255,255,1) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,1) 1px,transparent 1px);background-size:44px 44px;}

/* ── SAYFA ── */
.page{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 20px 56px;}

/* ── KART ── */
.card{
  width:100%;max-width:420px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--glass-bd2);
  border-radius:var(--r2);
  padding:40px 38px 36px;
  box-shadow:0 32px 80px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.22);
  animation:cardIn 0.65s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(0.96)}to{opacity:1;transform:translateY(0) scale(1)}}

/* ── LOGO ── */
.logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:32px;}
.logo-img-box{
  width:64px;height:64px;border-radius:18px;
  background:linear-gradient(135deg,rgba(126,234,173,0.22),rgba(61,184,122,0.10));
  border:1px solid rgba(126,234,173,0.32);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;
  box-shadow:0 8px 28px rgba(126,234,173,0.18);
}
.logo-img-box img{width:38px;height:38px;object-fit:contain;}
.logo-name{font-size:26px;font-weight:700;color:var(--t0);letter-spacing:-0.03em;}
.logo-name em{color:var(--accent);font-style:normal;}
.logo-tag{font-size:11px;color:var(--t3);letter-spacing:0.08em;margin-top:4px;}

/* ── TABS ── */
.tabs{display:flex;gap:4px;background:rgba(255,255,255,0.05);border:1px solid var(--glass-bd);border-radius:50px;padding:4px;margin-bottom:28px;}
.tab{
  flex:1;padding:8px;border-radius:50px;border:none;background:transparent;
  font-family:var(--sans);font-size:12px;font-weight:600;color:var(--t2);
  cursor:pointer;transition:all 0.2s;letter-spacing:0.04em;
}
.tab.on{background:rgba(255,255,255,0.14);color:var(--t0);box-shadow:0 2px 8px rgba(0,0,0,0.25);border:1px solid rgba(255,255,255,0.22);}

/* ── FORMLAR ── */
.form{display:none;}
.form.on{display:block;}

.field{margin-bottom:14px;}
.label{font-size:11px;font-weight:600;letter-spacing:0.09em;text-transform:uppercase;color:var(--t2);margin-bottom:7px;display:block;}
.inp-wrap{position:relative;}
.inp{
  width:100%;padding:12px 42px 12px 14px;
  background:var(--glass-inp);
  border:1px solid var(--glass-bd);
  border-radius:var(--r);
  font-family:var(--sans);font-size:14px;color:var(--t0);outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
  -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
}
.inp::placeholder{color:var(--t3);}
.inp:focus{border-color:rgba(126,234,173,0.45);box-shadow:0 0 0 3px rgba(126,234,173,0.08);}
.inp.err{border-color:rgba(255,100,100,0.5);box-shadow:0 0 0 3px rgba(255,100,100,0.07);}
.inp-ico{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  color:var(--t3);cursor:pointer;padding:4px;transition:color 0.15s;
  background:none;border:none;
}
.inp-ico:hover{color:var(--t1);}

/* ── UNUT ── */
.forgot{text-align:right;margin-top:-6px;margin-bottom:14px;}
.forgot a{font-size:12px;color:var(--t2);text-decoration:none;transition:color 0.15s;cursor:pointer;}
.forgot a:hover{color:var(--accent);}

/* ── BUTON ── */
.btn{
  width:100%;padding:13px;margin-top:4px;
  background:linear-gradient(135deg,rgba(126,234,173,0.22),rgba(61,184,122,0.12));
  border:1px solid rgba(126,234,173,0.38);
  border-radius:var(--r);
  font-family:var(--sans);font-size:13px;font-weight:700;
  letter-spacing:0.07em;text-transform:uppercase;
  color:var(--accent);cursor:pointer;
  transition:all 0.2s;
  box-shadow:0 4px 20px rgba(126,234,173,0.12);
  position:relative;overflow:hidden;
}
.btn:hover{background:linear-gradient(135deg,rgba(126,234,173,0.30),rgba(61,184,122,0.18));box-shadow:0 6px 28px rgba(126,234,173,0.22);}
.btn:active{transform:scale(0.99);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-spin{display:none;width:16px;height:16px;border:2px solid rgba(126,234,173,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── ALERT ── */
.alert{
  border-radius:10px;padding:11px 14px;
  font-size:12px;line-height:1.55;margin-bottom:16px;
  display:none;align-items:flex-start;gap:9px;
}
.alert.err{display:flex;background:var(--err-bg);border:1px solid var(--err-bd);color:var(--err);}
.alert.ok{display:flex;background:var(--ok-bg);border:1px solid var(--ok-bd);color:var(--accent);}
.alert svg{flex-shrink:0;margin-top:1px;}

/* ── GÜVENLİK NOTU ── */
.sec-note{
  margin-top:22px;padding:11px 13px;
  background:rgba(126,234,173,0.05);
  border:1px solid rgba(126,234,173,0.14);
  border-radius:10px;
  display:flex;gap:10px;align-items:flex-start;
}
.sec-note-txt{font-size:11px;color:rgba(126,234,173,0.65);line-height:1.6;}

/* ── ŞİFRE GÜÇ ── */
.pw-strength{height:3px;border-radius:2px;background:rgba(255,255,255,0.08);margin-top:6px;overflow:hidden;}
.pw-strength-bar{height:100%;border-radius:2px;width:0%;transition:width 0.3s,background 0.3s;}

/* ── RESET FORM ── */
.back-link{text-align:center;margin-top:16px;}
.back-link a{font-size:12px;color:var(--t2);text-decoration:none;cursor:pointer;transition:color 0.15s;}
.back-link a:hover{color:var(--accent);}

/* ── FOOTER ── */
.footer{position:relative;z-index:1;text-align:center;font-size:11px;color:var(--t3);padding:12px 0 20px;margin-top:-10px;}
</style>
</head>
<body>

<div class="bg">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="orb o4"></div>
  <div class="grid"></div>
</div>

<div class="page">
  <div class="card">

    <!-- LOGO -->
    <div class="logo-wrap">
      <div class="logo-img-box">
        <img src="favicon.png" alt="Gövdağ" />
      </div>
      <div class="logo-name">gövda<em>ğ</em></div>
      <div class="logo-tag">güvenli parola kasası</div>
    </div>

    <!-- TABS: Giriş / Kayıt -->
    <div class="tabs" id="tabs">
      <button class="tab on" onclick="switchTab('login')">Giriş Yap</button>
      <button class="tab" onclick="switchTab('register')">Hesap Oluştur</button>
    </div>

    <!-- ALERT ALANI -->
    <div class="alert" id="alert">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alertMsg"></span>
    </div>

    <!-- ── GİRİŞ FORMU ── -->
    <div class="form on" id="formLogin">
      <div class="field">
        <label class="label">E-posta</label>
        <div class="inp-wrap">
          <input class="inp" type="email" id="loginEmail" placeholder="ornek@sirket.com" autocomplete="email" />
          <svg class="inp-ico" style="pointer-events:none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
      </div>
      <div class="field">
        <label class="label">Şifre</label>
        <div class="inp-wrap">
          <input class="inp" type="password" id="loginPw" placeholder="••••••••" autocomplete="current-password" />
          <button class="inp-ico" onclick="togglePw('loginPw',this)" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="forgot"><a onclick="switchTab('reset')">Şifremi unuttum</a></div>
      <button class="btn" id="btnLogin" onclick="doLogin()">
        <span id="btnLoginTxt">Giriş Yap</span>
        <div class="btn-spin" id="btnLoginSpin"></div>
      </button>
    </div>

    <!-- ── KAYIT FORMU ── -->
    <div class="form" id="formRegister">
      <div class="field">
        <label class="label">Ad Soyad</label>
        <div class="inp-wrap">
          <input class="inp" type="text" id="regName" placeholder="Ahmet Yılmaz" autocomplete="name" />
          <svg class="inp-ico" style="pointer-events:none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </div>
      <div class="field">
        <label class="label">Büro / Şirket Adı</label>
        <div class="inp-wrap">
          <input class="inp" type="text" id="regBureau" placeholder="Yılmaz Hukuk Bürosu" />
          <svg class="inp-ico" style="pointer-events:none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        </div>
      </div>
      <div class="field">
        <label class="label">E-posta</label>
        <div class="inp-wrap">
          <input class="inp" type="email" id="regEmail" placeholder="ornek@sirket.com" autocomplete="email" />
          <svg class="inp-ico" style="pointer-events:none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
      </div>
      <div class="field">
        <label class="label">Şifre</label>
        <div class="inp-wrap">
          <input class="inp" type="password" id="regPw" placeholder="En az 8 karakter" autocomplete="new-password" oninput="checkStrength(this.value)" />
          <button class="inp-ico" onclick="togglePw('regPw',this)" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="pw-strength"><div class="pw-strength-bar" id="pwBar"></div></div>
      </div>
      <button class="btn" id="btnReg" onclick="doRegister()">
        <span id="btnRegTxt">Hesap Oluştur</span>
        <div class="btn-spin" id="btnRegSpin"></div>
      </button>
    </div>

    <!-- ── ŞİFRE SIFIRLAMA ── -->
    <div class="form" id="formReset">
      <div class="field">
        <label class="label">E-posta adresiniz</label>
        <div class="inp-wrap">
          <input class="inp" type="email" id="resetEmail" placeholder="ornek@sirket.com" />
          <svg class="inp-ico" style="pointer-events:none" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
      </div>
      <button class="btn" id="btnReset" onclick="doReset()">
        <span id="btnResetTxt">Sıfırlama Bağlantısı Gönder</span>
        <div class="btn-spin" id="btnResetSpin"></div>
      </button>
      <div class="back-link"><a onclick="switchTab('login')">← Giriş ekranına dön</a></div>
    </div>

    <!-- GÜVENLİK NOTU -->
    <div class="sec-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(126,234,173,0.7)" stroke-width="1.8" width="14" height="14" style="flex-shrink:0;margin-top:1px"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <div class="sec-note-txt">Parolalarınız AES-256-GCM ile şifrelenir. Master şifreniz hiçbir zaman sunucuya gönderilmez.</div>
    </div>

  </div>
</div>

<div class="footer">© 2026 Gövdağ — Tüm hakları saklıdır</div>

<script>
// ════════════════════════════════════════════════════════════
// YAPILANDIRMA — Supabase bilgilerini buraya girin
// ════════════════════════════════════════════════════════════
const SUPABASE_URL  = 'https://waqnacujnbnwxnmsjzxq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndhcW5hY3VqbmJud3hubXNqenhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjY5NjMsImV4cCI6MjA5MDMwMjk2M30.QWjJjcOxcvlwnMYiY_y87Juap9W9tIVY3VPLJB7zryM';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ════════════════════════════════════════════════════════════
// OTURUM KONTROLÜ — zaten giriş yapmışsa dashboard'a yönlendir
// ════════════════════════════════════════════════════════════
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = 'dashboard.html';
})();

// ════════════════════════════════════════════════════════════
// TAB YÖNETİMİ
// ════════════════════════════════════════════════════════════
function switchTab(tab) {
  clearAlert();
  document.querySelectorAll('.form').forEach(f => f.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));

  if (tab === 'login') {
    document.getElementById('formLogin').classList.add('on');
    document.querySelectorAll('.tab')[0].classList.add('on');
    document.getElementById('tabs').style.display = 'flex';
  } else if (tab === 'register') {
    document.getElementById('formRegister').classList.add('on');
    document.querySelectorAll('.tab')[1].classList.add('on');
    document.getElementById('tabs').style.display = 'flex';
  } else if (tab === 'reset') {
    document.getElementById('formReset').classList.add('on');
    document.getElementById('tabs').style.display = 'none';
  }
}

// ════════════════════════════════════════════════════════════
// ALERT
// ════════════════════════════════════════════════════════════
function showAlert(msg, type = 'err') {
  const el = document.getElementById('alert');
  el.className = 'alert ' + type;
  document.getElementById('alertMsg').textContent = msg;
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function clearAlert() {
  document.getElementById('alert').className = 'alert';
}

// ════════════════════════════════════════════════════════════
// YÜKLEME DURUMU
// ════════════════════════════════════════════════════════════
function setLoading(btnId, spinId, txtId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  document.getElementById(spinId).style.display = loading ? 'block' : 'none';
  document.getElementById(txtId).style.display  = loading ? 'none'  : 'inline';
}

// ════════════════════════════════════════════════════════════
// GİRİŞ
// ════════════════════════════════════════════════════════════
async function doLogin() {
  clearAlert();
  const email = document.getElementById('loginEmail').value.trim();
  const pw    = document.getElementById('loginPw').value;

  if (!email || !pw) { showAlert('E-posta ve şifre alanları boş bırakılamaz.'); return; }

  setLoading('btnLogin','btnLoginSpin','btnLoginTxt', true);

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });

  setLoading('btnLogin','btnLoginSpin','btnLoginTxt', false);

  if (error) {
    const msgs = {
      'Invalid login credentials': 'E-posta veya şifre hatalı.',
      'Email not confirmed':        'E-posta adresinizi doğrulamanız gerekiyor. Lütfen gelen kutunuzu kontrol edin.',
      'Too many requests':          'Çok fazla deneme yaptınız. Lütfen birkaç dakika bekleyin.',
    };
    showAlert(msgs[error.message] || 'Giriş başarısız: ' + error.message);
    document.getElementById('loginPw').classList.add('err');
    setTimeout(() => document.getElementById('loginPw').classList.remove('err'), 2000);
    return;
  }

  // Büro kontrolü — kullanıcının bir bürosu var mı?
  const { data: membership } = await sb
    .from('bureau_members')
    .select('bureau_id, role')
    .eq('user_id', data.user.id)
    .single();

  if (!membership) {
    // Bürosu yok — onboarding'e yönlendir
    window.location.href = 'onboarding.html';
    return;
  }

  // Başarılı giriş
  window.location.href = 'master-sifre.html';
}

// ════════════════════════════════════════════════════════════
// KAYIT
// ════════════════════════════════════════════════════════════
async function doRegister() {
  clearAlert();
  const name   = document.getElementById('regName').value.trim();
  const bureau = document.getElementById('regBureau').value.trim();
  const email  = document.getElementById('regEmail').value.trim();
  const pw     = document.getElementById('regPw').value;

  if (!name || !bureau || !email || !pw) { showAlert('Tüm alanları doldurun.'); return; }
  if (pw.length < 8) { showAlert('Şifre en az 8 karakter olmalıdır.'); return; }

  setLoading('btnReg','btnRegSpin','btnRegTxt', true);

  // 1. Supabase Auth kaydı
  const { data: authData, error: authErr } = await sb.auth.signUp({
    email,
    password: pw,
    options: {
      data: { full_name: name, bureau_name: bureau }
    }
  });

  if (authErr) {
    setLoading('btnReg','btnRegSpin','btnRegTxt', false);
    const msgs = {
      'User already registered': 'Bu e-posta ile zaten bir hesap var.',
      'Password should be at least 6 characters': 'Şifre çok kısa.',
    };
    showAlert(msgs[authErr.message] || 'Kayıt başarısız: ' + authErr.message);
    return;
  }

  // 2. Büro + üyelik oluştur (e-posta doğrulandıktan sonra RLS izin verecek)
  //    Bunu bir Supabase Edge Function üzerinden yapacağız.
  //    Şimdilik metadata'ya kaydediyoruz, onboarding sırasında işleneçek.
  sessionStorage.setItem('pending_bureau', bureau);
  sessionStorage.setItem('pending_name', name);

  setLoading('btnReg','btnRegSpin','btnRegTxt', false);

  showAlert(
    'Hesabınız oluşturuldu! ' + email + ' adresine bir doğrulama e-postası gönderdik. Lütfen e-postanızı onaylayın.',
    'ok'
  );

  // Doğrulama sonrası onboarding'e yönlendir
  setTimeout(() => {
    window.location.href = 'onboarding.html';
  }, 2000);
}

// ════════════════════════════════════════════════════════════
// ŞİFRE SIFIRLAMA
// ════════════════════════════════════════════════════════════
async function doReset() {
  clearAlert();
  const email = document.getElementById('resetEmail').value.trim();
  if (!email) { showAlert('E-posta adresinizi girin.'); return; }

  setLoading('btnReset','btnResetSpin','btnResetTxt', true);

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/reset-password.html'
  });

  setLoading('btnReset','btnResetSpin','btnResetTxt', false);

  if (error) { showAlert('Hata: ' + error.message); return; }

  showAlert(
    email + ' adresine şifre sıfırlama bağlantısı gönderdik. Lütfen gelen kutunuzu kontrol edin.',
    'ok'
  );
}

// ════════════════════════════════════════════════════════════
// YARDIMCI FONKSİYONLAR
// ════════════════════════════════════════════════════════════
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.style.color = inp.type === 'text' ? 'rgba(126,234,173,0.8)' : '';
}

function checkStrength(val) {
  const bar = document.getElementById('pwBar');
  let score = 0;
  if (val.length >= 8)  score++;
  if (val.length >= 12) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const colors = ['#ff5c5c','#ff8c42','#ffc107','#7eeaad','#3db87a'];
  const widths  = ['15%','30%','55%','78%','100%'];
  bar.style.width      = val.length ? widths[Math.min(score-1,4)] : '0%';
  bar.style.background = val.length ? colors[Math.min(score-1,4)] : 'transparent';
}

// Enter tuşu desteği
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('formLogin').classList.contains('on'))    doLogin();
  if (document.getElementById('formRegister').classList.contains('on')) doRegister();
  if (document.getElementById('formReset').classList.contains('on'))    doReset();
});
</script>
